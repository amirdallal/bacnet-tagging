<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACnet Semantic Intelligence</title>
<style>
:root{
  --bg:#f1f5f9;--sidebar:#1e293b;--sidebar-hover:#334155;--sidebar-text:#94a3b8;
  --accent:#0d9488;--accent-light:#14b8a6;--accent-bg:rgba(13,148,136,.08);
  --card:#fff;--card-border:#e2e8f0;--text:#334155;--text-muted:#64748b;--text-light:#94a3b8;
  --success:#059669;--warning:#d97706;--danger:#dc2626;--info:#2563eb;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:13px}
/* Layout */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:56px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--sidebar);display:flex;align-items:center;padding:0 24px;gap:16px;border-bottom:1px solid #334155}
.topbar h1{color:#f8fafc;font-size:16px;font-weight:600;letter-spacing:-.3px}
.topbar .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.topbar .badge{background:var(--accent);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.topbar-right{margin-left:auto;display:flex;gap:12px;align-items:center}
.topbar-stat{color:var(--sidebar-text);font-size:11px}
.topbar-stat b{color:#f8fafc}
/* Sidebar */
.sidebar{background:var(--sidebar);overflow-y:auto;padding:16px;border-right:1px solid #334155}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}
.upload-zone{border:2px dashed #475569;border-radius:var(--radius);padding:24px 12px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(13,148,136,.05)}
.upload-icon{font-size:28px;margin-bottom:6px;opacity:.7}
.upload-text{color:var(--sidebar-text);font-size:12px}
.upload-text strong{color:#cbd5e1}
input[type="file"]{display:none}
.site-input{width:100%;padding:8px 12px;border:1px solid #475569;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:12px;margin-bottom:8px}
.site-input:focus{outline:none;border-color:var(--accent)}
.site-input::placeholder{color:#64748b}
.btn{padding:8px 16px;border:none;border-radius:6px;font-weight:600;cursor:pointer;transition:.15s;font-size:12px;display:inline-flex;align-items:center;gap:6px;line-height:1.4}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover:not(:disabled){background:var(--accent-light)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:4px;font-weight:500}
.btn-claude{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}.btn-claude:hover:not(:disabled){background:linear-gradient(135deg,#4f46e5,#7c3aed)}
.btn-edit{background:#475569;color:#e2e8f0}.btn-edit:hover{background:#64748b}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#047857}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--text)}.btn-outline:hover{background:#f8fafc}
.btn-ghost{background:transparent;color:var(--sidebar-text);border:1px solid #475569}.btn-ghost:hover{background:#334155;color:#e2e8f0}
.btn-block{width:100%}
/* Device list */
.section-label{color:var(--sidebar-text);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px;padding:0 4px}
.dev-item{padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:4px;border:1px solid transparent}
.dev-item:hover{background:var(--sidebar-hover)}
.dev-item.selected{background:rgba(13,148,136,.15);border-color:rgba(13,148,136,.3)}
.dev-name{color:#e2e8f0;font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-meta{color:var(--sidebar-text);font-size:10px;margin-top:2px}
.dev-dots{display:flex;gap:4px;margin-top:6px}
.dev-dots .mini-bar{height:3px;border-radius:2px;flex:1}
/* Content */
.content{padding:24px;overflow-y:auto}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
/* Cards */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card+.card{margin-top:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#f1f5f9;border-radius:8px;padding:3px}
.tab{padding:8px 16px;cursor:pointer;border:none;background:none;font-size:12px;font-weight:500;color:var(--text-muted);border-radius:6px;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card);color:var(--accent);box-shadow:var(--shadow);font-weight:600}
.tab-content{display:none}.tab-content.active{display:block}
/* Summary stats */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat-card.accent{border-color:var(--accent);background:var(--accent-bg)}
.stat-num{font-size:24px;font-weight:700;line-height:1}
.stat-num.c-total{color:var(--text)}.stat-num.c-high{color:var(--success)}.stat-num.c-med{color:var(--warning)}.stat-num.c-low{color:#ea580c}.stat-num.c-none{color:var(--danger)}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-input{padding:7px 12px;border:1px solid var(--card-border);border-radius:6px;font-size:12px;background:var(--card);color:var(--text);min-width:220px}
.filter-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.filter-select{padding:7px 12px;border:1px solid var(--card-border);border-radius:6px;font-size:12px;background:var(--card);color:var(--text);cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent)}
.count-label{font-size:11px;color:var(--text-muted);margin-left:auto}
/* Table */
.table-wrap{overflow-x:auto;max-height:480px;overflow-y:auto;border:1px solid var(--card-border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:1}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--card-border);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#f8fafc}
/* Confidence */
.conf{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.conf-high{background:#ecfdf5;color:#065f46}.conf-med{background:#fffbeb;color:#92400e}.conf-low{background:#fff7ed;color:#9a3412}.conf-none{background:#fef2f2;color:#991b1b}
.conf::before{content:'';width:6px;height:6px;border-radius:50%}
.conf-high::before{background:var(--success)}.conf-med::before{background:var(--warning)}.conf-low::before{background:#ea580c}.conf-none::before{background:var(--danger)}
/* Tags */
.brick-tag{display:inline-block;background:#f0fdfa;color:var(--accent);padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid rgba(13,148,136,.15)}
.hs-tag{display:inline-block;background:#f8fafc;color:var(--text-muted);padding:2px 6px;border-radius:3px;font-size:9px;border:1px solid var(--card-border);margin:1px}
.src-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.src-pattern{background:#eff6ff;color:var(--info)}.src-ollama{background:#faf5ff;color:#7c3aed}.src-claude{background:#fdf4ff;color:#a21caf}.src-unit{background:#fff7ed;color:#c2410c}
/* Actions bar */
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
/* JSON */
.json-viewer{background:#0f172a;color:#94a3b8;padding:20px;border-radius:var(--radius);overflow:auto;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;max-height:600px;white-space:pre;border:1px solid #1e293b;line-height:1.5}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.6);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:28px;max-width:520px;width:90%;box-shadow:0 25px 50px rgba(0,0,0,.15)}
.modal h3{font-size:16px;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;color:var(--text);font-size:12px}
.form-group input{width:100%;padding:9px 12px;border:1px solid var(--card-border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text)}
.form-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.form-group input[readonly]{background:#f8fafc;color:var(--text-muted)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty h3{color:var(--text);margin-bottom:8px;font-size:16px}
/* Loading */
.spinner{border:3px solid var(--card-border);border-top:3px solid var(--accent);border-radius:50%;width:28px;height:28px;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px;color:var(--text-muted)}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--sidebar);color:#e2e8f0;border-radius:8px;font-size:12px;z-index:2000;box-shadow:0 8px 32px rgba(0,0,0,.2);transition:.3s;transform:translateY(80px);opacity:0;border:1px solid #334155}
.toast.show{transform:translateY(0);opacity:1}
/* Tag completeness indicator */
.tag-meter{display:inline-flex;align-items:center;gap:5px}
.tag-meter-bar{width:32px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;position:relative}
.tag-meter-fill{height:100%;border-radius:3px;transition:width .3s}
.tag-meter-fill.tm-good{background:var(--success)}.tag-meter-fill.tm-partial{background:var(--warning)}.tag-meter-fill.tm-low{background:var(--danger)}
.tag-meter-count{font-size:9px;font-weight:700;min-width:14px;text-align:center}
.tag-meter-count.tc-good{color:var(--success)}.tag-meter-count.tc-partial{color:var(--warning)}.tag-meter-count.tc-low{color:var(--danger)}
/* BRICK cell */
.brick-cell{display:flex;flex-direction:column;gap:2px}
.brick-cat{font-size:9px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
/* Tag popover */
.tag-cell{position:relative}
.tag-preview{display:flex;flex-wrap:wrap;gap:3px;align-items:center;cursor:default}
.tag-more{background:var(--accent-bg);color:var(--accent);padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid rgba(13,148,136,.15)}
.tag-more:hover{background:rgba(13,148,136,.15)}
.tag-popover{display:none;position:absolute;top:100%;left:0;z-index:100;background:var(--card);border:1px solid var(--card-border);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.12);padding:14px 16px;min-width:280px;max-width:380px;margin-top:4px}
.tag-popover.show{display:block}
.tag-popover::before{content:'';position:absolute;top:-6px;left:20px;width:10px;height:10px;background:var(--card);border-left:1px solid var(--card-border);border-top:1px solid var(--card-border);transform:rotate(45deg)}
.tp-section{margin-bottom:10px}
.tp-section:last-child{margin-bottom:0}
.tp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:5px}
.tp-tags{display:flex;flex-wrap:wrap;gap:3px}
.tp-tag-brick{background:#f0fdfa;color:var(--accent);padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid rgba(13,148,136,.15)}
.tp-tag-marker{background:#f8fafc;color:var(--text);padding:2px 7px;border-radius:3px;font-size:10px;border:1px solid var(--card-border)}
.tp-tag-equip{background:#eff6ff;color:var(--info);padding:2px 7px;border-radius:3px;font-size:10px;border:1px solid rgba(37,99,235,.12);font-weight:500}
.tp-tag-value{background:#fefce8;color:#854d0e;padding:2px 7px;border-radius:3px;font-size:10px;border:1px solid rgba(202,138,4,.12)}
/* Enhanced Claude button for low-tag rows */
.btn-claude-urgent{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;border:none;cursor:pointer;animation:gentlePulse 2s ease-in-out infinite}
.btn-claude-urgent:hover{background:linear-gradient(135deg,#4f46e5,#7c3aed)}
@keyframes gentlePulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.3)}50%{box-shadow:0 0 0 4px rgba(99,102,241,0)}}
/* Ollama progress banner */
.ollama-banner{background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;color:#e2e8f0;position:relative;overflow:hidden}
.ollama-banner .ob-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ollama-banner .ob-title{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
.ollama-banner .ob-title .pulse{width:8px;height:8px;border-radius:50%;background:#14b8a6;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ollama-banner .ob-stats{display:flex;gap:16px;font-size:11px;color:#94a3b8}
.ollama-banner .ob-stats b{color:#e2e8f0}
.ollama-banner .ob-bar{height:4px;background:#334155;border-radius:2px;overflow:hidden}
.ollama-banner .ob-bar-fill{height:100%;background:linear-gradient(90deg,#0d9488,#14b8a6);border-radius:2px;transition:width .3s ease-out;width:0%}
.ollama-banner .ob-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11px;color:#64748b}
.btn-stop{background:#dc2626;color:#fff;padding:4px 12px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}
.btn-stop:hover{background:#b91c1c}
/* Row flash animation for updated points */
@keyframes rowFlash{0%{background:#ecfdf5}100%{background:transparent}}
tr.row-updated td{animation:rowFlash 1.5s ease-out}
/* Done banner */
.ollama-done{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:var(--radius);padding:12px 20px;margin-bottom:16px;color:#065f46;font-size:13px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="dot"></div>
    <h1>BACnet Semantic Intelligence</h1>
    <span class="badge">v1.1</span>
    <div class="topbar-right">
      <span class="topbar-stat" id="ollamaStatus"></span>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">&#128206;</div>
      <div class="upload-text"><strong>Drop JSON file</strong><br>or click to browse</div>
      <input type="file" id="fileInput" accept=".json">
    </div>
    <input type="text" class="site-input" id="siteName" placeholder="Site name (optional)">
    <button class="btn btn-primary btn-block" id="parseBtn" disabled>Parse & Enrich</button>
    <button class="btn btn-ghost btn-block" style="margin-top:6px;display:none" id="allPointsBtn" onclick="loadAllPoints()">All Points</button>
    <div id="deviceList"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div id="ollamaBannerSlot"></div>
    <div id="contentArea">
      <div class="empty">
        <div class="empty-icon">&#9889;</div>
        <h3>Ready to Start</h3>
        <p>Upload a BACnet discovery report to begin semantic enrichment</p>
        <p style="margin-top:12px;font-size:11px;color:var(--text-light)">Supports JSON discovery reports with automatic pattern matching + Ollama AI</p>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Classification</h3>
    <div class="form-group">
      <label>Point Name</label>
      <input type="text" id="editPointName" readonly>
    </div>
    <div class="form-group">
      <label>BRICK Class URI</label>
      <input type="text" id="editBrick" placeholder="https://brickschema.org/schema/Brick#...">
    </div>
    <div class="form-group">
      <label>BRICK Label</label>
      <input type="text" id="editBrickLabel" placeholder="e.g. Zone Air Temperature Sensor">
    </div>
    <div class="form-group">
      <label>Haystack Tags (comma-separated)</label>
      <input type="text" id="editHaystack" placeholder="sensor, temp, zone, air, point">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="saveEdit()">Save Correction</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AUTH='Basic '+btoa('admin:changeme');
let currentSiteId=null,currentDeviceId=null,currentDevicePoints=[];
let editingPointId=null;
let ollamaStream=null, ollamaStreamId=null;

function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function toast(msg,ms=3000){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}

async function api(path,opts={}){
  const res=await fetch(path,{...opts,headers:{'Authorization':AUTH,...(opts.headers||{})}});
  if(!res.ok){const e=await res.json().catch(()=>({error:res.statusText}));throw new Error(e.error||'API error')}
  return res.json();
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function srcTag(src){
  const m={'pattern':'src-pattern','ai-ollama':'src-ollama','ai-claude':'src-claude','unit-fallback':'src-unit','cache':'src-pattern','manual':'src-pattern'};
  return `<span class="src-tag ${m[src]||'src-pattern'}">${esc(src)}</span>`;
}

// Check Ollama on load
(async()=>{
  try{const r=await fetch('http://localhost:11434/api/tags',{signal:AbortSignal.timeout(2000)});
    if(r.ok){$('#ollamaStatus').innerHTML='<b style="color:#14b8a6">Ollama</b> connected'}
    else{$('#ollamaStatus').innerHTML='Ollama <span style="color:#ef4444">offline</span>'}
  }catch{$('#ollamaStatus').innerHTML='Ollama <span style="color:#ef4444">offline</span>'}
})();

// ---- Upload ----
const dropzone=$('#dropzone'),fileInput=$('#fileInput');
let selectedFile=null;
dropzone.addEventListener('click',()=>fileInput.click());
dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragover')});
dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('dragover');if(e.dataTransfer.files.length)pickFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',()=>{if(fileInput.files.length)pickFile(fileInput.files[0])});

function pickFile(f){
  if(!f.name.endsWith('.json')){toast('Please select a JSON file');return}
  selectedFile=f;
  dropzone.innerHTML=`<div class="upload-icon">&#9989;</div><div class="upload-text"><strong>${esc(f.name)}</strong><br>${(f.size/1024/1024).toFixed(1)} MB</div><input type="file" id="fileInput" accept=".json">`;
  $('#fileInput').addEventListener('change',()=>{if($('#fileInput').files.length)pickFile($('#fileInput').files[0])});
  if(!$('#siteName').value)$('#siteName').value=f.name.replace(/\.json$/,'').replace(/[_-]/g,' ');
  $('#parseBtn').disabled=false;
}

// ---- Parse + Enrich (two-phase: instant patterns → progressive Ollama) ----
$('#parseBtn').addEventListener('click',async()=>{
  if(!selectedFile)return;
  const btn=$('#parseBtn');btn.disabled=true;btn.textContent='Parsing...';
  $('#contentArea').innerHTML='<div class="loading"><div class="spinner"></div>Parsing discovery report...</div>';
  try{
    // Phase 1: Parse
    const form=new FormData();form.append('file',selectedFile);form.append('siteName',$('#siteName').value||'Site');
    const data=await fetch('/api/parse',{method:'POST',headers:{'Authorization':AUTH},body:form}).then(r=>r.json());
    if(data.error)throw new Error(data.error);
    currentSiteId=data.siteId;
    toast('Parsed '+data.stats.totalObjects.toLocaleString()+' objects');

    // Phase 2: Pattern enrichment (instant)
    btn.textContent='Enriching...';
    const enrichData=await api('/api/enrich',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({siteId:currentSiteId})});
    toast(`Pattern matched: ${enrichData.summary.high} high, ${enrichData.summary.medium} med — ${enrichData.ollamaCandidates} candidates for Ollama`,4000);

    // Show results immediately
    const devData=await api('/api/devices?siteId='+currentSiteId);
    renderDeviceList(devData.devices);
    $('#allPointsBtn').style.display='block';
    await loadAllPoints();

    // Phase 3: Start progressive Ollama enhancement via SSE
    if(enrichData.ollamaCandidates>0){
      startOllamaStream(enrichData.ollamaCandidates);
    }
  }catch(e){toast('Error: '+e.message);$('#contentArea').innerHTML='<div class="empty"><div class="empty-icon">&#10060;</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>'}
  finally{btn.disabled=false;btn.textContent='Parse & Enrich'}
});

// ---- Ollama SSE Stream ----
function startOllamaStream(candidateCount){
  stopOllamaStream();

  // Insert progress banner at top of content
  const banner=document.createElement('div');
  banner.id='ollamaBanner';
  banner.className='ollama-banner';
  banner.innerHTML=`
    <div class="ob-top">
      <span class="ob-title"><span class="pulse"></span> Ollama AI Enhancing</span>
      <div style="display:flex;gap:16px;align-items:center">
        <span class="ob-stats" id="obTime" style="font-family:monospace">0:00</span>
        <button class="btn-stop" onclick="stopOllamaStream()">Stop</button>
      </div>
    </div>
    <div class="ob-bar"><div class="ob-bar-fill" id="obFill"></div></div>
    <div class="ob-bottom">
      <span id="obStatus">Starting... 0/${candidateCount} points</span>
      <span class="ob-stats"><b id="obEnhanced">0</b> improved &middot; <b id="obPct">0</b>%</span>
    </div>
  `;
  const slot=$('#ollamaBannerSlot');
  slot.innerHTML=''; // clear any previous banner
  slot.appendChild(banner);

  // Open SSE (pass auth via query param since EventSource can't send headers)
  const authParam=btoa('admin:changeme');
  const url=`/api/enrich-stream?siteId=${currentSiteId}&auth=${authParam}`;
  const es=new EventSource(url);
  ollamaStream=es;

  es.addEventListener('start',e=>{
    const d=JSON.parse(e.data);
    ollamaStreamId=d.streamId;
  });

  es.addEventListener('progress',e=>{
    const d=JSON.parse(e.data);
    updateBanner(d.processed,d.enhanced,d.total,d.pct,d.elapsedMs);
  });

  es.addEventListener('point',e=>{
    const d=JSON.parse(e.data);
    updateBanner(d.processed,d.enhanced,d.total,Math.round(d.processed*100/d.total),d.elapsedMs);
    updateRowInPlace(d);
    updateStatsFromStream();
  });

  es.addEventListener('skip',e=>{
    const d=JSON.parse(e.data);
    updateBanner(d.processed,0,d.total,Math.round(d.processed*100/d.total),d.elapsedMs);
  });

  es.addEventListener('done',e=>{
    const d=JSON.parse(e.data);
    es.close();ollamaStream=null;ollamaStreamId=null;
    const secs=Math.floor((d.elapsedMs||0)/1000);
    const mins=Math.floor(secs/60);const s=secs%60;
    const timeStr=mins+':'+(s<10?'0':'')+s;
    const banner=$('#ollamaBanner');
    if(banner){
      banner.className='ollama-done';
      banner.innerHTML=`<span style="font-size:16px">&#9989;</span> Ollama complete: <b>${d.enhanced}</b> of ${d.total} points improved in ${timeStr}`;
      setTimeout(()=>{banner.remove();$('#ollamaBannerSlot').innerHTML=''},10000);
    }
    toast(`Ollama done: ${d.enhanced}/${d.total} improved in ${timeStr}`);
    updateStatsFromStream();
  });

  es.onerror=()=>{
    es.close();ollamaStream=null;
    const banner=$('#ollamaBanner');
    if(banner){banner.className='ollama-done';banner.innerHTML='Ollama stream ended';setTimeout(()=>banner.remove(),3000)}
  };
}

function stopOllamaStream(){
  if(ollamaStream){ollamaStream.close();ollamaStream=null}
  if(ollamaStreamId){
    fetch('/api/enrich-stream/cancel',{method:'POST',headers:{'Authorization':AUTH,'Content-Type':'application/json'},body:JSON.stringify({streamId:ollamaStreamId})}).catch(()=>{});
    ollamaStreamId=null;
  }
  const banner=$('#ollamaBanner');
  if(banner){banner.className='ollama-done';banner.innerHTML='<span style="font-size:16px">&#9940;</span> Ollama enhancement stopped';setTimeout(()=>banner.remove(),3000)}
}

function updateBanner(processed,enhanced,total,pct,elapsedMs){
  const fill=$('#obFill');if(fill)fill.style.width=pct+'%';
  const status=$('#obStatus');if(status)status.textContent=`Processing... ${processed}/${total} points`;
  const enh=$('#obEnhanced');if(enh)enh.textContent=enhanced;
  const pctEl=$('#obPct');if(pctEl)pctEl.textContent=pct;
  if(elapsedMs!=null){
    const timeEl=$('#obTime');
    if(timeEl){
      const secs=Math.floor(elapsedMs/1000);
      const mins=Math.floor(secs/60);
      const s=secs%60;
      timeEl.textContent=mins+':'+(s<10?'0':'')+s;
      // ETA estimate
      if(processed>0&&pct<100){
        const etaSecs=Math.round((elapsedMs/processed)*(total-processed)/1000);
        const etaM=Math.floor(etaSecs/60);
        const etaS=etaSecs%60;
        timeEl.textContent+=` (ETA ~${etaM}:${etaS<10?'0':''}${etaS})`;
      }
    }
  }
}

function updateRowInPlace(d){
  // Find the row by pointId and update it live
  const rows=$$('tr[data-pointid="'+d.pointId+'"]');
  rows.forEach(tr=>{
    // Update BRICK class cell
    const cells=tr.querySelectorAll('td');
    if(cells.length>=6){
      // BRICK class (index depends on table type — find by content)
      const brickCell=tr.querySelector('.brick-tag')?.parentElement;
      if(brickCell)brickCell.innerHTML='<span class="brick-tag">'+esc(d.brickClass||'')+'</span>';
      // Confidence cell
      const confCell=tr.querySelector('.conf')?.parentElement;
      if(confCell)confCell.innerHTML='<span class="conf '+confClass(d.confidenceLevel)+'">'+(d.confidence*100).toFixed(0)+'%</span>';
      // Source cell
      const srcCell=tr.querySelector('.src-tag')?.parentElement;
      if(srcCell)srcCell.innerHTML=srcTag(d.source);
    }
    // Flash the row green
    tr.classList.remove('row-updated');
    void tr.offsetWidth; // force reflow
    tr.classList.add('row-updated');
  });
}

async function updateStatsFromStream(){
  // Lightweight refresh of just the stats counters
  try{
    if(currentDeviceId){
      const data=await api(`/api/device-points?siteId=${currentSiteId}&deviceId=${currentDeviceId}`);
      const s=data.summary;
      updateStatCards(s);
    }else if(currentSiteId){
      const p=new URLSearchParams({siteId:currentSiteId,limit:'1'});
      const data=await api('/api/all-points?'+p);
      updateStatCards(data.summary);
    }
  }catch{}
}

function updateStatCards(s){
  const cards=$$('.stat-num');
  if(cards.length>=5){
    const total=s.total||(s.high+s.medium+s.low+s.noMatch);
    cards[0].textContent=total;
    cards[1].textContent=s.high;
    cards[2].textContent=s.medium;
    cards[3].textContent=s.low;
    cards[4].textContent=s.noMatch;
  }
}

function renderPointsTable(points){

}

function renderPointRow(p,showDevice){
  const tc=p.tagCount||0;
  const tmClass=tc>=6?'tm-good':tc>=3?'tm-partial':'tm-low';
  const tcClass=tc>=6?'tc-good':tc>=3?'tc-partial':'tc-low';
  const tmPct=Math.min(100,Math.round(tc*100/10));
  const equipKw=['vav','ahu','chiller','chilled','pump','compressor','vfd','boiler','coolingTower','fcu','condenser','hot','motor'];
  const markers=(p.haystackTags||[]).filter(t=>!equipKw.includes(t));
  const equipTags=(p.haystackTags||[]).filter(t=>equipKw.includes(t));
  const valEntries=Object.entries(p.haystackValues||{});
  const allTagCount=markers.length+equipTags.length+valEntries.length+(p.brickClass?1:0);
  const previewTags=(p.haystackTags||[]).slice(0,3);
  const moreCount=allTagCount-previewTags.length-(p.brickClass?1:0);
  const isUrgent=tc<4;
  const pJson=JSON.stringify(p).replace(/'/g,"&#39;");

  return `<tr data-pointid="${p.pointId}" data-conf="${p.confidenceLevel}" data-search="${(p.objectName+' '+(p.brickClass||'')+' '+(p.haystackTags||[]).join(' ')+' '+(p.deviceId||'')).toLowerCase()}">
    ${showDevice?'<td style="font-size:10px;color:var(--text-muted)" title="'+esc(p.deviceId)+'">'+esc(p.deviceId)+'</td>':''}
    <td title="${esc(p.objectName)}"><strong>${esc(p.objectName)}</strong>${p.equipmentRef?'<br><span style="color:var(--text-light);font-size:10px">'+esc(p.equipmentRef)+'</span>':''}</td>
    <td style="color:var(--text-muted)">${esc(p.objectType)}</td>
    <td style="color:var(--text-muted)">${esc(p.units||'-')}</td>
    <td>${p.brickClass?`<div class="brick-cell">${p.brickCategory?'<span class="brick-cat">'+esc(p.brickCategory)+'</span>':''}<span class="brick-tag">${esc(p.brickClass)}</span></div>`:'<span style="color:var(--text-light)">-</span>'}</td>
    <td class="tag-cell">
      <div class="tag-preview" onmouseenter="showPopover(this)" onmouseleave="hidePopover(this)">
        ${previewTags.map(t=>'<span class="hs-tag">'+esc(t)+'</span>').join('')}
        ${moreCount>0?'<span class="tag-more">+'+moreCount+'</span>':''}
        <div class="tag-meter"><div class="tag-meter-bar"><div class="tag-meter-fill ${tmClass}" style="width:${tmPct}%"></div></div><span class="tag-meter-count ${tcClass}">${tc}</span></div>
        <div class="tag-popover" data-popover>
          ${p.brickClass?'<div class="tp-section"><div class="tp-label">BRICK Ontology</div><div class="tp-tags"><span class="tp-tag-brick">'+esc(p.brickClass)+'</span></div></div>':''}
          ${markers.length?'<div class="tp-section"><div class="tp-label">Haystack Marker Tags</div><div class="tp-tags">'+markers.map(t=>'<span class="tp-tag-marker">'+esc(t)+'</span>').join('')+'</div></div>':''}
          ${equipTags.length?'<div class="tp-section"><div class="tp-label">Equipment Context</div><div class="tp-tags">'+equipTags.map(t=>'<span class="tp-tag-equip">'+esc(t)+'</span>').join('')+'</div></div>':''}
          ${valEntries.length?'<div class="tp-section"><div class="tp-label">Value Tags</div><div class="tp-tags">'+valEntries.map(([k,v])=>'<span class="tp-tag-value">'+esc(k)+'='+esc(v)+'</span>').join('')+'</div></div>':''}
          ${tc===0?'<div style="color:var(--text-light);font-size:11px;font-style:italic">No tags — use Claude AI to classify</div>':''}
        </div>
      </div>
    </td>
    <td><span class="conf ${confClass(p.confidenceLevel)}">${(p.confidence*100).toFixed(0)}%</span></td>
    <td>${srcTag(p.source)}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-edit btn-sm" onclick='editPoint(${pJson})'>Edit</button>
      ${isUrgent?`<button class="btn-claude-urgent" onclick="aiEnhanceOne('${p.pointId}',this)">Claude AI</button>`:`<button class="btn btn-claude btn-sm" onclick="aiEnhanceOne('${p.pointId}',this)">Claude</button>`}
    </td>
  </tr>`;
}

function showPopover(el){
  const pop=el.querySelector('[data-popover]');
  if(pop)pop.classList.add('show');
}
function hidePopover(el){
  const pop=el.querySelector('[data-popover]');
  if(pop)pop.classList.remove('show');
}
function initPopovers(){
  // Close popovers when clicking outside
  document.addEventListener('click',e=>{
    if(!e.target.closest('.tag-cell')){
      $$('.tag-popover.show').forEach(p=>p.classList.remove('show'));
    }
  });
}

function confClass(l){return{HIGH:'conf-high',MEDIUM:'conf-med',LOW:'conf-low',NO_MATCH:'conf-none'}[l]||'conf-none'}

function filterTable(){
  const s=($('#searchInput')?.value||'').toLowerCase();
  const c=$('#confFilter')?.value||'';
  $$('#pointsBody tr').forEach(tr=>{
    // Keep recently enriched rows visible regardless of filter
    if(tr.dataset.enriched==='true'){tr.style.display='';return}
    tr.style.display=(!c||tr.dataset.conf===c)&&(!s||tr.dataset.search.includes(s))?'':'none';
  });
  updateCount();
}
function updateCount(){
  const v=$$('#pointsBody tr:not([style*="display: none"])').length;
  const t=$$('#pointsBody tr').length;
  const el=$('#countLabel');if(el)el.textContent=v+' of '+t;
}

// ---- Claude AI per-row with inline diff ----
async function aiEnhanceOne(pointId,btn){
  btn.disabled=true;btn.textContent='...';
  const row=btn.closest('tr');
  try{
    const data=await api('/api/enhance-point',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({siteId:currentSiteId,pointId})});
    if(data.enhanced && row){
      // Show inline diff instead of refreshing
      showEnrichmentDiff(row, data);
      toast(`Claude: +${data.diff.tagCountDelta} tags, ${Math.round(data.diff.confidenceDelta*100)}% confidence boost`);
    }else{
      toast(data.reason||'Claude could not improve');
      btn.disabled=false;btn.textContent=btn.classList.contains('btn-claude-urgent')?'Claude AI':'Claude';
    }
  }catch(e){
    toast('Error: '+e.message);
    btn.disabled=false;btn.textContent=btn.classList.contains('btn-claude-urgent')?'Claude AI':'Claude';
  }
}

function showEnrichmentDiff(row, data){
  const d=data.diff;
  // Mark row as enriched — prevent filter from hiding it
  row.dataset.enriched='true';
  row.style.borderLeft='3px solid var(--accent)';
  row.style.background='rgba(13,148,136,.03)';

  // Update BRICK class cell with diff
  const brickCell=row.querySelector('.brick-cell')?.parentElement || row.querySelector('.brick-tag')?.parentElement;
  if(brickCell){
    let html='<div class="brick-cell">';
    if(data.brickCategory) html+=`<span class="brick-cat">${esc(data.brickCategory)}</span>`;
    if(d.oldBrickClass && d.oldBrickClass!==data.brickClass){
      html+=`<span style="text-decoration:line-through;color:var(--text-light);font-size:10px">${esc(d.oldBrickClass)}</span>`;
    }
    html+=`<span class="brick-tag">${esc(data.brickClass)}</span>`;
    html+='</div>';
    brickCell.innerHTML=html;
  }

  // Update confidence cell with animation
  const confSpan=row.querySelector('.conf');
  if(confSpan){
    const oldPct=Math.round(d.oldConfidence*100);
    const newPct=Math.round(data.confidence*100);
    confSpan.className='conf '+confClass(data.confidenceLevel);
    confSpan.innerHTML=`<span style="text-decoration:line-through;opacity:.5;margin-right:4px">${oldPct}%</span>${newPct}%`;
  }

  // Update tags cell — show added tags highlighted
  const tagCell=row.querySelector('.tag-cell');
  if(tagCell){
    const allTags=data.haystackTags||[];
    const addedSet=new Set(d.addedTags||[]);
    const vals=Object.entries(data.haystackValues||{});
    const tc=data.tagCount||0;
    const tmClass=tc>=6?'tm-good':tc>=3?'tm-partial':'tm-low';
    const tcClass=tc>=6?'tc-good':tc>=3?'tc-partial':'tc-low';
    const tmPct=Math.min(100,Math.round(tc*100/10));

    let html='<div class="tag-preview" onmouseenter="showPopover(this)" onmouseleave="hidePopover(this)">';
    // Show first 4 tags, highlight new ones
    const preview=allTags.slice(0,4);
    preview.forEach(t=>{
      if(addedSet.has(t)){
        html+=`<span class="hs-tag" style="background:#ecfdf5;border-color:#a7f3d0;color:#065f46">+${esc(t)}</span>`;
      }else{
        html+=`<span class="hs-tag">${esc(t)}</span>`;
      }
    });
    const moreCount=allTags.length-preview.length+vals.length;
    if(moreCount>0) html+=`<span class="tag-more">+${moreCount}</span>`;
    // Tag meter
    html+=`<div class="tag-meter"><div class="tag-meter-bar"><div class="tag-meter-fill ${tmClass}" style="width:${tmPct}%"></div></div><span class="tag-meter-count ${tcClass}">${tc}</span></div>`;
    // Delta indicator
    if(d.tagCountDelta>0){
      html+=`<span style="color:var(--success);font-size:10px;font-weight:700">+${d.tagCountDelta}</span>`;
    }
    // Popover with all tags
    const equipKw=['vav','ahu','chiller','chilled','pump','compressor','vfd','boiler','coolingTower','fcu','condenser','hot','motor'];
    const markers=allTags.filter(t=>!equipKw.includes(t));
    const equipTags=allTags.filter(t=>equipKw.includes(t));
    html+=`<div class="tag-popover" data-popover>`;
    if(data.brickClass) html+=`<div class="tp-section"><div class="tp-label">BRICK Ontology</div><div class="tp-tags"><span class="tp-tag-brick">${esc(data.brickClass)}</span></div></div>`;
    if(markers.length) html+=`<div class="tp-section"><div class="tp-label">Haystack Markers</div><div class="tp-tags">${markers.map(t=>addedSet.has(t)?`<span class="tp-tag-marker" style="background:#ecfdf5;border-color:#a7f3d0">+${esc(t)}</span>`:`<span class="tp-tag-marker">${esc(t)}</span>`).join('')}</div></div>`;
    if(equipTags.length) html+=`<div class="tp-section"><div class="tp-label">Equipment Context</div><div class="tp-tags">${equipTags.map(t=>addedSet.has(t)?`<span class="tp-tag-equip" style="background:#dbeafe;border-color:#93c5fd">+${esc(t)}</span>`:`<span class="tp-tag-equip">${esc(t)}</span>`).join('')}</div></div>`;
    if(vals.length) html+=`<div class="tp-section"><div class="tp-label">Value Tags</div><div class="tp-tags">${vals.map(([k,v])=>`<span class="tp-tag-value">${esc(k)}=${esc(v)}</span>`).join('')}</div></div>`;
    html+=`</div></div>`;
    tagCell.innerHTML=html;
  }

  // Update source cell
  const srcCell=row.querySelector('.src-tag')?.parentElement;
  if(srcCell) srcCell.innerHTML=srcTag(data.source);

  // Replace action buttons with dismiss
  const actCell=row.querySelector('td:last-child');
  if(actCell){
    actCell.innerHTML=`<button class="btn btn-outline btn-sm" onclick="dismissEnrichedRow(this)" title="Remove from view" style="font-size:10px">Dismiss</button>`;
  }

  // Flash animation
  row.classList.remove('row-updated');
  void row.offsetWidth;
  row.classList.add('row-updated');

  // Auto-dismiss after 30s
  setTimeout(()=>{
    if(row.dataset.enriched==='true') dismissEnrichedRow(row.querySelector('td:last-child button'));
  },30000);
}

function dismissEnrichedRow(btn){
  const row=btn?.closest('tr');
  if(!row) return;
  row.dataset.enriched='false';
  // If current filter would hide this row, fade it out
  const conf=$('#confFilter')?.value||$('#globalConfFilter')?.value||'';
  if(conf && row.dataset.conf!==conf){
    row.style.transition='opacity .4s';
    row.style.opacity='0';
    setTimeout(()=>row.style.display='none',400);
  }else{
    // Refresh the row to normal state
    row.style.borderLeft='';
    row.style.background='';
    if(currentDeviceId)selectDevice(currentDeviceId);else loadAllPoints();
  }
}

// ---- Claude AI bulk ----
async function aiEnhanceAll(){
  toast('Running Claude AI on all points...',5000);
  try{
    const data=await api('/api/enhance-with-ai',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({siteId:currentSiteId,maxPoints:200,minConfidence:1.0})});
    toast(`Claude: ${data.pointsEnhanced}/${data.pointsProcessed} improved`);
    if(currentDeviceId)selectDevice(currentDeviceId);else loadAllPoints();
  }catch(e){toast('Error: '+e.message)}
}

// ---- All Points ----
let allSearch='',allConf='';
async function loadAllPoints(conf,search){
  $$('.dev-item').forEach(i=>i.classList.remove('selected'));
  currentDeviceId=null;
  allConf=conf||allConf||'';allSearch=search??allSearch??'';
  $('#contentArea').innerHTML='<div class="loading"><div class="spinner"></div>Loading all points...</div>';
  try{
    const p=new URLSearchParams({siteId:currentSiteId,limit:'1000'});
    if(allConf)p.set('confidence',allConf);if(allSearch)p.set('search',allSearch);
    const data=await api('/api/all-points?'+p);
    renderAllPointsView(data);
  }catch(e){$('#contentArea').innerHTML='<div class="empty"><div class="empty-icon">&#10060;</div><p>'+esc(e.message)+'</p></div>'}
}

function renderAllPointsView(data){
  const s=data.summary;
  currentDevicePoints=data.points;
  $('#contentArea').innerHTML=`
    <h3 style="margin-bottom:16px;font-size:15px">All Points <span style="color:var(--text-muted);font-weight:400">(${data.total.toLocaleString()} supported)</span></h3>
    ${renderStats(s)}
    <div class="filters">
      <input type="text" class="filter-input" id="searchInput" placeholder="Search all points..." value="${esc(allSearch)}" oninput="filterTable()">
      <select class="filter-select" id="confFilter" onchange="filterTable()">
        <option value="">All Levels</option><option value="HIGH">HIGH</option><option value="MEDIUM">MEDIUM</option><option value="LOW">LOW</option><option value="NO_MATCH">NO_MATCH</option>
      </select>
      <span class="count-label" id="countLabel">${data.points.length} of ${data.total}</span>
    </div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Device</th><th>Point Name</th><th>Type</th><th>Units</th>
        <th>BRICK Class</th><th>Tags</th><th>Confidence</th><th>Source</th><th style="width:100px">Actions</th>
      </tr></thead><tbody id="pointsBody">${data.points.map(p=>renderPointRow(p,true)).join('')}
      </tbody></table>
    </div>
    <div class="actions">
      <button class="btn btn-claude btn-sm" onclick="aiEnhanceAll()">Claude AI Enhance All</button>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">Export CSV</button>
    </div>
  `;
}

// ---- TD ----
async function loadTD(){
  const el=$('#tdContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Generating...</div>';
  try{
    const data=await api('/api/generate-td',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({siteId:currentSiteId})});
    const td=data.thingDescriptions.find(t=>t.metadata.deviceId===currentDeviceId)||data.thingDescriptions[0];
    if(!td){el.innerHTML='<div class="empty">No TD generated</div>';return}
    window._lastTD=td;
    el.innerHTML=`<div style="margin-bottom:12px;display:flex;gap:10px">
      <button class="btn btn-success btn-sm" onclick="downloadTD()">Download JSON</button>
      <button class="btn btn-outline btn-sm" onclick="switchTab('points',$$('.tab')[0])">Back to Points</button>
    </div><div class="json-viewer">${esc(JSON.stringify(td,null,2))}</div>`;
  }catch(e){el.innerHTML='<div class="empty"><p>'+esc(e.message)+'</p></div>'}
}
function downloadTD(){
  if(!window._lastTD)return;
  const b=new Blob([JSON.stringify(window._lastTD,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='TD-'+(currentDeviceId||'site')+'.json';a.click();URL.revokeObjectURL(a.href);toast('Downloaded');
}

// ---- CSV ----
function exportCSV(){
  if(!currentDevicePoints.length){toast('No points');return}
  const h=['Name','Type','Units','EquipRef','BRICK Category','BRICK Class','BRICK URI','Haystack Markers','Haystack Values','Tag Count','Confidence','Level','Source','Flagged'];
  const rows=currentDevicePoints.map(p=>[p.objectName,p.objectType,p.units,p.equipmentRef||'',p.brickCategory||'',p.brickClass||'',p.brickUri||'',(p.haystackTags||[]).join(';'),Object.entries(p.haystackValues||{}).map(([k,v])=>k+'='+v).join(';'),p.tagCount||0,p.confidence,p.confidenceLevel,p.source,p.flaggedForReview?'yes':'no']);
  const csv=[h,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='enrichment-'+(currentDeviceId||'all')+'.csv';a.click();URL.revokeObjectURL(a.href);toast('CSV exported');
}
</script>
